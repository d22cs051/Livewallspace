name: Build and Release (main)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Generate release metadata
        id: meta
        run: |
          TAG="auto-${{ github.run_number }}-${GITHUB_SHA::7}"
          ASSET="Livewallspace-${TAG}-arm64.zip"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: Build app (arm64)
        run: |
          xcodebuild \
            -project Livewallspace.xcodeproj \
            -scheme Livewallspace \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package app
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/Livewallspace.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle not found at $APP_PATH"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "${{ steps.meta.outputs.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Livewallspace-arm64
          path: ${{ steps.meta.outputs.asset }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Livewallspace ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.meta.outputs.asset }}
